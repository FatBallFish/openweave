appId: com.openweave.alpha
productName: OpenWeave
asar: false
directories:
  output: release/alpha
files:
  - dist/**/*
  - package.json
extraResources:
  - from: bin
    to: bin
mac:
  identity: null
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-alpha-${arch}.${ext}"
  target:
    - target: dir
    - target: zip
