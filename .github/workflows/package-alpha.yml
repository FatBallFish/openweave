name: package-alpha

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mac-alpha-package:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify alpha package and smoke
        run: npm run verify:alpha

      - name: Upload alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openweave-alpha-macos
          path: release/alpha
          if-no-files-found: error
